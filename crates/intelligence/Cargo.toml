[package]
name = "strata-intelligence"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license = "BUSL-1.1"
repository.workspace = true
publish = false
description = "Embedding and inference infrastructure for Strata"

[features]
default = []
embed = ["dep:strata-inference"]
# GPU acceleration is loaded dynamically at runtime — these features
# are kept for backwards compatibility but simply enable 'embed'.
embed-cuda = ["embed"]
embed-metal = ["embed"]

[dependencies]
strata-core = { path = "../core" }
strata-engine = { path = "../engine" }
tracing = { workspace = true }
once_cell = { workspace = true }
strata-inference = { path = "../inference", optional = true, features = ["local", "download"] }

[dev-dependencies]
tempfile = { workspace = true }
