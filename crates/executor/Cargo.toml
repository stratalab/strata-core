[package]
name = "strata-executor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "Command execution layer for Strata database"

[features]
default = []
embed = ["strata-intelligence/embed", "strata-engine/embed"]
expand = ["strata-search/expand"]
rerank = ["strata-search/rerank"]
# Cloud generation providers — forwarded through intelligence to inference
anthropic = ["embed", "strata-intelligence/anthropic"]
openai = ["embed", "strata-intelligence/openai"]
google = ["embed", "strata-intelligence/google"]

[dependencies]
# Internal crates
strata-core = { path = "../core" }
strata-engine = { path = "../engine" }
strata-intelligence = { path = "../intelligence" }
strata-search = { path = "../search" }
strata-security = { path = "../security" }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
rmp-serde = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Encoding
base64 = { workspace = true }

# UUIDs for RunId
uuid = { workspace = true }

# Datetime parsing
chrono = { workspace = true }

# String similarity
strsim = { workspace = true }

# Logging
tracing = { workspace = true }

# Unix signals for IPC server
libc = "0.2"

[dev-dependencies]
tempfile = { workspace = true }
