version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license = "BUSL-1.1"
repository.workspace = true
publish = false
description = "Inference engine for Strata — local (llama.cpp) and cloud providers"

[features]
default = []
local = []          # Enable local llama.cpp inference
download = []       # Enable model download from HuggingFace
anthropic = []      # Enable Anthropic (Claude) cloud provider
