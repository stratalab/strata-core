[package]
name = "strata-inference"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license = "BUSL-1.1"
repository.workspace = true
publish = false
description = "Inference engine for Strata — local (llama.cpp) and cloud providers"

[features]
default = []
local = []              # Enable local llama.cpp inference
download = ["ureq"]     # Enable model download from HuggingFace
anthropic = []          # Enable Anthropic (Claude) cloud provider
openai = []             # Enable OpenAI (GPT) cloud provider
google = []             # Enable Google (Gemini) cloud provider

[dependencies]
thiserror = { workspace = true }
tracing = { workspace = true }
ureq = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
