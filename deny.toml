# Cargo-deny configuration for Strata workspace
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
# Only bincode remains - unmaintained with no drop-in replacement
# Migration to bitcode/postcard tracked separately
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained - migration to bitcode/postcard tracked separately" },
    { id = "RUSTSEC-2026-0097", reason = "rand 0.8.5 only used by phf_generator at build time - no custom logger context" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]
exceptions = []
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
