 Branch-Segmented HNSW: MVCC Branch-Fork-Merge as Segment Lifecycle

 Context

 Profiling shows HNSW insertion is the throughput bottleneck (~96ms for 64 vectors at N=3600), not GPU embedding (~93ms stable). No production vector DB does synchronous per-document HNSW insertion.

 Core insight: Strata's branch-fork-merge — typically used for isolation and version control — can simultaneously serve as the segment lifecycle manager for vector indexes. Branch isolation provides lock-free parallel index construction. Branch
 merge provides segment adoption. Multi-graph search across branch-produced segments yields higher recall than monolithic HNSW. Transactional semantics and index performance reinforce each other.

 Two-Phase Plan

 Phase 1: SegmentedHnswBackend (this PR)

 Foundation for branch-segment unification. Replaces monolithic HNSW with a multi-segment architecture: O(1) inserts into an active buffer, periodic sealing into small HNSW segments, fan-out search across all segments. Each SealedSegment wraps an
 existing HnswBackend unchanged.

 Phase 2: Branch-Aware Merge Semantics (follow-up PR)

 After merge copies VectorRecords at the KV level, trigger vector-aware collection reload on the target. The target's SegmentedHnswBackend rebuilds segmented HNSW from all vectors — including those adopted from the merged branch. Future
 optimization: transfer sealed segment graphs directly (O(metadata) adoption) with VectorId remapping.

 ---
 Phase 1: SegmentedHnswBackend

 Architecture

 SegmentedHnswBackend implements VectorIndexBackend
   |
   +-- ActiveBuffer (brute-force search, O(1) insert)
   |     Small n (up to seal_threshold=256)
   |     Each vector tracked by VectorId + (created_at, deleted_at)
   |
   +-- sealed: Vec<SealedSegment>
   |     Each wraps HnswBackend (reused unchanged)
   |     Ordered by segment_id for deterministic search
   |     Tagged with source_branch for future merge awareness
   |
   +-- Global VectorHeap (single source of truth for embeddings + ID allocation)

