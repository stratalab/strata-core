 Step 1.1: Data Structures (segmented.rs)

 pub struct SegmentedHnswConfig {
     pub hnsw: HnswConfig,
     pub seal_threshold: usize,  // Default 256
 }

 struct ActiveBuffer {
     ids: Vec<VectorId>,
     timestamps: BTreeMap<VectorId, (u64, Option<u64>)>,  // (created_at, deleted_at)
 }

 struct SealedSegment {
     segment_id: u64,
     hnsw: HnswBackend,             // Reused unchanged — has its own VectorHeap
     live_count: usize,
     source_branch: Option<BranchId>, // Phase 2: tracks which branch produced this segment
 }

 pub struct SegmentedHnswBackend {
     config: SegmentedHnswConfig,
     vector_config: VectorConfig,
     heap: VectorHeap,              // Global source of truth
     active: ActiveBuffer,
     sealed: Vec<SealedSegment>,
     next_segment_id: u64,
     pending_timestamps: BTreeMap<VectorId, u64>,
 }

 Dual heaps: The global heap is the authoritative source for get(), contains(), vector_ids(), snapshot_state(). Each SealedSegment.hnsw has its own internal VectorHeap (embeddings copied at seal time) used for HNSW graph search. This avoids
 modifying HnswBackend to accept external heap references.

 Step 1.2: VectorIndexBackend Implementation

 insert_with_timestamp (O(1) amortized):
 1. Upsert embedding into global heap
 2. If update: soft-delete VectorId from wherever it lives (active buffer or sealed segment)
 3. Append VectorId + timestamp to active buffer
 4. If active.len() >= seal_threshold: call seal_active_buffer()

 seal_active_buffer() — triggered at threshold:
 1. Drain active buffer (ids + timestamps)
 2. Sort ids by VectorId for determinism
 3. Create new HnswBackend (reuses existing HnswBackend::new)
 4. For each vector: copy embedding from global heap, call hnsw.insert_with_timestamp()
 5. Mark any deleted vectors via hnsw.delete_with_timestamp()
 6. Push SealedSegment { segment_id, hnsw, live_count, source_branch: None }

 search — fan-out + merge:
 1. Brute-force search active buffer (iterate timestamps, skip deleted, compute similarity from global heap)
 2. For each sealed segment: segment.hnsw.search(query, k)
 3. Merge all results: sort by (score desc, VectorId asc), truncate to k

 search_at / search_in_range — same fan-out, each segment filters temporally.

 delete_with_timestamp:
 1. Delete from global heap
 2. Mark deleted in active buffer if present, else find in sealed segments and call segment.hnsw.delete_with_timestamp()

 rebuild_index (recovery):
 1. Apply pending timestamps
 2. Sort all VectorIds in active buffer
 3. Chunk into groups of seal_threshold, build HNSW per chunk
 4. Remainder stays in active buffer

 Snapshot methods: Delegate to global heap (vector_ids(), snapshot_state(), restore_snapshot_state()). Segment structure is ephemeral — rebuilt on recovery.

 Accessor methods: len(), dimension(), metric(), config(), get(), contains() all delegate to global heap. index_type_name() returns "segmented_hnsw". memory_usage() sums global heap + active buffer overhead + all sealed segment memory.

