 Phase 2: Branch-Aware Merge (follow-up PR)

 The Problem

 Currently merge_branches() in branch_ops.rs copies VectorRecords at the KV level. The target branch's in-memory HNSW backend does NOT see the merged vectors until the collection is reloaded.

 Step 2.1: Post-Merge Collection Reload

 Add a post_merge_reload_vectors() method to VectorStore that:
 1. For each vector collection in the target branch
 2. Scans all VectorRecords from KV (including newly merged ones)
 3. Rebuilds the SegmentedHnswBackend (which now chunks into segments via rebuild_index())
 4. This is already faster than monolithic HNSW because of segmented build

 Call this from merge_branches() after KV writes complete.

 Step 2.2: O(metadata) Segment Adoption (optimization)

 Instead of rebuilding from KV, transfer sealed segment graphs directly:
 1. Add extract_segments(&mut self) -> Vec<SealedSegment> to SegmentedHnswBackend
 2. Add adopt_segments(&mut self, segments: Vec<SealedSegment>) to SegmentedHnswBackend
 3. During merge: extract sealed segments from source backend, remap VectorIds to target's ID space, adopt into target backend
 4. VectorId remapping: allocate new IDs from target's counter, update HNSW nodes + KV records

 Step 2.3: Parallel Ingestion Pattern

 With Phase 1 + 2 complete, users can:
 # Fork N worker branches from main
 workers = [db.fork(f"worker-{i}") for i in range(4)]

 # Parallel ingestion (each worker builds its own segments)
 for i, chunk in enumerate(partition(data, 4)):
     workers[i].kv.put_many(chunk)  # auto-embed builds HNSW segments
     workers[i].flush()

 # Merge all workers back (each worker's segments adopted by main)
 for w in workers:
     db.merge(w.name, strategy="lww")

 # Search on main fans out across all adopted segments
 results = db.search("query", k=10)

 ---
 Determinism Invariants Preserved

 - R3: BTreeMap for timestamps, sorted VectorId within segments, segments ordered by segment_id
 - R4: All search merges use (score desc, VectorId asc) comparator
 - T4: Global heap allocator, snapshot_state/restore_snapshot_state unchanged
 - Deterministic RNG: Each sealed segment's HnswBackend uses seed=42, vectors inserted in VectorId order

