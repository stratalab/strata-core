name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # 1. Build strata binary with embedding statically linked
  # --------------------------------------------------------------------------
  build:
    name: Build strata (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake

      - name: Build (full features: embed + arrow + cloud)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --features embed,arrow,cloud --package strata-cli --target ${{ matrix.target }}

      - name: Upload strata binary (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: strata-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/strata

      - name: Upload strata binary (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: strata-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/strata.exe

  # --------------------------------------------------------------------------
  # 2. Package archives
  # --------------------------------------------------------------------------
  package:
    name: Package (${{ matrix.target }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - target: x86_64-apple-darwin
            archive: tar.gz
          - target: aarch64-apple-darwin
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: README.md
          sparse-checkout-cone-mode: false

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download strata binary
        uses: actions/download-artifact@v4
        with:
          name: strata-${{ matrix.target }}
          path: staging/bin

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p staging-flat
          chmod +x staging/bin/strata
          cp staging/bin/strata staging-flat/
          cp README.md staging-flat/
          ARCHIVE_NAME="strata-v${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar czf "${ARCHIVE_NAME}" -C staging-flat strata README.md
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p staging-flat
          cp staging/bin/strata.exe staging-flat/
          cp README.md staging-flat/
          ARCHIVE_NAME="strata-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip"
          cd staging-flat
          7z a "../${ARCHIVE_NAME}" ./*
          cd ..
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  # --------------------------------------------------------------------------
  # 3. Create GitHub Release
  # --------------------------------------------------------------------------
  release:
    name: Create Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum strata-v* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          gh release create "${{ github.ref_name }}" \
            --title "Strata ${{ github.ref_name }}" \
            --generate-notes \
            strata-v*.tar.gz strata-v*.zip checksums-sha256.txt

  # --------------------------------------------------------------------------
  # 4. Update Homebrew Tap
  # --------------------------------------------------------------------------
  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS and Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 for archives
        id: sha
        run: |
          cd artifacts
          echo "arm64=$(sha256sum strata-v${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(sha256sum strata-v${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum strata-v${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum strata-v${{ steps.version.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: stratalab/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA_X86_64: ${{ steps.sha.outputs.x86_64 }}
          SHA_LINUX_X86_64: ${{ steps.sha.outputs.linux_x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          cat > homebrew-tap/Formula/strata.rb <<'FORMULA'
          class Strata < Formula
            desc "Production-grade embedded database for AI agents"
            homepage "https://stratadb.org"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/stratalab/strata-core/releases/download/vVERSION_PLACEHOLDER/strata-vVERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/stratalab/strata-core/releases/download/vVERSION_PLACEHOLDER/strata-vVERSION_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_PLACEHOLDER"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/stratalab/strata-core/releases/download/vVERSION_PLACEHOLDER/strata-vVERSION_PLACEHOLDER-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/stratalab/strata-core/releases/download/vVERSION_PLACEHOLDER/strata-vVERSION_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_X86_64_PLACEHOLDER"
              end
            end

            def install
              bin.install "strata"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/strata --version")
            end
          end
          FORMULA

          # Strip YAML indentation from the generated formula
          sed -i'' -e 's/^          //' homebrew-tap/Formula/strata.rb

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" homebrew-tap/Formula/strata.rb
          sed -i "s/SHA_ARM64_PLACEHOLDER/${SHA_ARM64}/g" homebrew-tap/Formula/strata.rb
          sed -i "s/SHA_X86_64_PLACEHOLDER/${SHA_X86_64}/g" homebrew-tap/Formula/strata.rb
          sed -i "s/SHA_LINUX_X86_64_PLACEHOLDER/${SHA_LINUX_X86_64}/g" homebrew-tap/Formula/strata.rb
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/${SHA_LINUX_ARM64}/g" homebrew-tap/Formula/strata.rb

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/strata.rb
          git commit -m "Update strata to v${{ steps.version.outputs.version }}"
          git push
