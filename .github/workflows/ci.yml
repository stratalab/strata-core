name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-deny
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features
        # No -- -D warnings: workspace.lints is the authority. clippy::all = deny
        # handles clippy warnings; warn-level rust lints (missing_docs, unreachable_pub)
        # are allowed until their owning scopes clear them.
      - name: Lockfile consistency
        run: cargo metadata --locked --format-version 1 > /dev/null
      - name: Advisory + license check
        run: cargo deny check
      - name: DAG guard
        run: |
          # Guard: engine must not have normal dep on vector or graph
          if cargo tree --package strata-engine --edges=normal --format="{p}" | grep -q strata-vector; then
            echo "ERROR: strata-engine has normal dep on strata-vector" && exit 1
          fi
          if cargo tree --package strata-engine --edges=normal --format="{p}" | grep -q strata-graph; then
            echo "ERROR: strata-engine has normal dep on strata-graph" && exit 1
          fi
          # Guard: vector_benchmarks must live in vector crate, not engine
          if [ -f crates/engine/benches/vector_benchmarks.rs ]; then
            echo "ERROR: vector_benchmarks.rs belongs in crates/vector/benches/" && exit 1
          fi
          # Manifest guard: engine must not depend on vector/graph (neither normal nor dev-deps)
          if grep -qE "^strata-(vector|graph)" crates/engine/Cargo.toml; then
            echo "ERROR: engine Cargo.toml must not list strata-vector or strata-graph" && exit 1
          fi

  test:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
      - name: Doc tests
        run: cargo test --workspace --doc --all-features --exclude strata-inference

  feature-matrix:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - name: Feature powerset check
        # usearch-enabled is root-crate only, not forwarded through workspace
        run: cargo hack --feature-powerset --depth 2 --exclude-features usearch-enabled check --workspace --exclude strata-inference
      - name: Per-feature test
        run: cargo hack --each-feature --exclude-features usearch-enabled test --workspace --exclude strata-inference

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release build
        run: cargo build --release --all

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: MSRV check
        run: cargo check --workspace --all-targets --all-features
